<nav class="wl-navbar" [class.scrolled]="isScrolled" [class.menu-open]="menuOpen">
  <div class="wl-navbar__inner">

    <a class="wl-navbar__logo" routerLink="/">
      <span class="logo-mark">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect x="0" y="6" width="6" height="16" rx="2" fill="currentColor"/>
          <rect x="9" y="0" width="6" height="28" rx="2" fill="currentColor" opacity="0.6"/>
          <rect x="18" y="4" width="6" height="20" rx="2" fill="currentColor" opacity="0.35"/>
        </svg>
      </span>
      <span class="logo-text">Work<strong>Line</strong></span>
    </a>

    <ul class="wl-navbar__links">
      <li><a routerLink="/how-it-works" routerLinkActive="active">როგორ მუშაობს</a></li>
      <li><a routerLink="/candidates" routerLinkActive="active">კანდიდატები</a></li>
      <li><a routerLink="/forbusiness" routerLinkActive="active">ბიზნესისთვის</a></li>
    </ul>

    <div class="wl-navbar__actions">
      <ng-container *ngIf="!authState.isLoggedIn()">
        <a class="btn-ghost full" (click)="openLogin()">შესვლა</a>
        <a class="btn-primary full" (click)="openChooseRole($event)">
          <span>რეგისტრაცია</span>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      </ng-container>

      <ng-container *ngIf="authState.isLoggedIn()">
        <a class="btn-ghost full" routerLink="/company/profile">
          {{ authState.company()?.name }}
        </a>
        <a class="btn-primary full" (click)="logout()">
          <span>გამოსვლა</span>
        </a>
      </ng-container>
    </div>

    <button
      class="wl-navbar__burger"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen"
      aria-label="მენიუ">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>
</nav>

<div class="wl-drawer" [class.open]="menuOpen">
  <div class="wl-drawer__backdrop" (click)="closeMenu()"></div>

  <div class="wl-drawer__panel">
    <div class="wl-drawer__header">
      <span class="logo-text">Work<strong>Line</strong></span>
    </div>

    <ul class="wl-drawer__nav">
      <li><a routerLink="/how-it-works" (click)="closeMenu()" routerLinkActive="active">როგორ მუშაობს</a></li>
      <li><a routerLink="/candidates" (click)="closeMenu()" routerLinkActive="active">კანდიდატები</a></li>
      <li><a routerLink="/forbusiness" (click)="closeMenu()" routerLinkActive="active">ბიზნესისთვის</a></li>
    </ul>

    <div class="wl-drawer__footer">
      <div class="wl-drawer__actions">
        <ng-container *ngIf="!authState.isLoggedIn()">
          <a class="btn-ghost full" (click)="openLogin(); closeMenu()">შესვლა</a>
          <a class="btn-primary full" (click)="openChooseRole($event); closeMenu()">რეგისტრაცია</a>
        </ng-container>

        <ng-container *ngIf="authState.isLoggedIn()">
          <a class="btn-ghost full" routerLink="/company/profile" (click)="closeMenu()">
            {{ authState.company()?.name }}
          </a>
          <a class="btn-primary full" (click)="logout(); closeMenu()">გამოსვლა</a>
        </ng-container>
      </div>

      <div class="logocenter">
        <span class="logo-mark">
          <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
            <rect x="0" y="6" width="6" height="16" rx="2" fill="currentColor"/>
            <rect x="9" y="0" width="6" height="28" rx="2" fill="currentColor" opacity="0.6"/>
            <rect x="18" y="4" width="6" height="20" rx="2" fill="currentColor" opacity="0.35"/>
          </svg>
        </span>
      </div>
    </div>
  </div>
</div>

<app-choose-role
  *ngIf="showChooseRole"
  (closed)="showChooseRole = false"
  (roleSelected)="onRoleSelected($event)">
</app-choose-role>

<app-registercompany
  *ngIf="showCompanyRegistration"
  (closed)="showCompanyRegistration = false">
</app-registercompany>

<app-registerperson
  *ngIf="showRegistration"
  (closed)="showRegistration = false">
</app-registerperson>

<app-login-in
  *ngIf="showLoginin"
  (closed)="showLoginin = false"
  (registerRequested)="showLoginin = false; openChooseRole()"
  (forgotRequested)="showLoginin = false; showForgot = true">
</app-login-in>

<app-forgotpassword
  *ngIf="showForgot"
  (closed)="showForgot = false"
  (backToLogin)="showLoginin = true">
</app-forgotpassword>

<div class="wl-navbar__spacer"></div>
